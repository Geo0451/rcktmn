<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RCKTMN Web Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      overflow: hidden;
    }
    body {
      position: fixed;
      inset: 0;
    }
    #game-shell {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #111;
    }
    #topbar {
      display: none;
    }
    #topbar h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    #topbar p {
      margin: 0;
      opacity: 0.8;
      font-size: 13px;
    }
    #fs-button {
      margin-left: auto;
      padding: 8px 12px;
      border: 1px solid #555;
      border-radius: 6px;
      background: #222;
      color: #fff;
      cursor: pointer;
    }
    #fs-button:hover {
      background: #2d2d2d;
    }
    #stage {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <div id="topbar">
      <h3>RCKTMN Web Demo</h3>
      <p>Click fullscreen, then click the game to capture input.</p>
      <button id="fs-button" type="button">Fullscreen</button>
    </div>
    <div id="stage">
      <canvas id="canvas" width="1920" height="1080" tabindex="1" autofocus></canvas>
    </div>
  </div>

<script>
// Mount IDBFS at /save and sync before runtime starts
const canvas = document.getElementById('canvas');
const fsButton = document.getElementById('fs-button');

function focusGame() {
  canvas.focus();
}

function enterFullscreen() {
  const target = document.getElementById('game-shell');
  if (target.requestFullscreen) {
    target.requestFullscreen().catch(() => {});
  } else if (canvas.requestFullscreen) {
    canvas.requestFullscreen().catch(() => {});
  }
  focusGame();
}

fsButton.addEventListener('click', enterFullscreen);
canvas.addEventListener('click', focusGame);
window.addEventListener('load', focusGame);

const preventKeys = new Set([
  'Tab', ' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
  'PageUp', 'PageDown', 'Home', 'End'
]);

window.addEventListener('keydown', function (e) {
  const key = e.key;
  const ctrlCombo = e.ctrlKey || e.metaKey;
  const specialControl = ctrlCombo && ['s', 'l', 'm'].includes(key.toLowerCase());
  if (preventKeys.has(key) || specialControl) {
    e.preventDefault();
    e.stopPropagation();
  }
}, true);

window.addEventListener('wheel', function (e) {
  if (document.activeElement === canvas) {
    e.preventDefault();
  }
}, { passive: false });

window.addEventListener('contextmenu', function (e) {
  if (document.activeElement === canvas) {
    e.preventDefault();
  }
});

var Module = {
  canvas: canvas,
  preRun: [function() {
    try {
      FS.mkdir('/save');
    } catch (e) {}
    try {
      FS.mount(IDBFS, {}, '/save');
      // Populate FS from IndexedDB
      FS.syncfs(true, function (err) {
        console.log('IDBFS sync (load) complete', err);
      });
    } catch (e) {
      console.warn('IDBFS mount failed:', e);
    }
  }],
  onRuntimeInitialized: function() {
    console.log('Runtime initialized');
  }
};
</script>

<script src="rcktmn.js"></script>

<script>
// Ensure /save is persisted before the page unloads
window.addEventListener('beforeunload', function (e) {
  try {
    FS.syncfs(false, function (err) {
      console.log('IDBFS sync (save) complete', err);
    });
  } catch (e) {}
});
</script>

</body>
</html>
